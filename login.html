<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>AgriPulse Pro — Sign In</title>
  <meta name="description" content="Sign in to your AgriPulse Pro executive dashboard for real-time agricultural telemetry and systems control.">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- ─── Tailwind config (same palette as the main site) ─── -->
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "secondary-fixed": "#cde5ff",
            "on-tertiary-fixed-variant": "#673a39",
            "on-secondary-container": "#004972",
            "surface-variant": "#e2e3e0",
            "error-container": "#ffdad6",
            "inverse-on-surface": "#f0f1ee",
            "on-background": "#1a1c1a",
            "on-tertiary-container": "#d29895",
            "inverse-primary": "#a5d0b9",
            "on-surface-variant": "#414844",
            "secondary-fixed-dim": "#94ccff",
            "secondary": "#006399",
            "surface-container-highest": "#e2e3e0",
            "primary": "#012d1d",
            "surface-container-high": "#e8e8e5",
            "outline-variant": "#c1c8c2",
            "on-primary-container": "#86af99",
            "on-tertiary": "#ffffff",
            "on-secondary": "#ffffff",
            "primary-fixed-dim": "#a5d0b9",
            "surface-dim": "#dadad7",
            "surface-container-low": "#f3f4f1",
            "on-primary": "#ffffff",
            "outline": "#717973",
            "primary-container": "#1b4332",
            "error": "#ba1a1a",
            "on-error": "#ffffff",
            "surface-container": "#eeeeeb",
            "tertiary-container": "#5a302f",
            "surface-bright": "#f9faf6",
            "on-surface": "#1a1c1a",
            "on-tertiary-fixed": "#331111",
            "surface-container-lowest": "#ffffff",
            "inverse-surface": "#2f312f",
            "background": "#f9faf6",
            "surface-tint": "#3f6653",
            "tertiary-fixed-dim": "#f5b7b4",
            "surface": "#f9faf6",
            "on-secondary-fixed": "#001d32",
            "primary-fixed": "#c1ecd4",
            "on-primary-fixed": "#002114",
            "tertiary-fixed": "#ffdad8",
            "on-secondary-fixed-variant": "#004b74",
            "secondary-container": "#67bafd",
            "on-error-container": "#93000a",
            "on-primary-fixed-variant": "#274e3d",
            "tertiary": "#401b1b",
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem",
          },
          spacing: {
            gutter: "24px",
            lg: "40px",
            xl: "64px",
            md: "24px",
            base: "8px",
            xs: "4px",
            "margin-desktop": "32px",
            "margin-mobile": "16px",
            sm: "12px",
          },
          fontFamily: {
            "data-mono": ["JetBrains Mono"],
            "label-caps": ["Hanken Grotesk"],
            "body-lg": ["Hanken Grotesk"],
            "display-lg": ["Hanken Grotesk"],
            "headline-sm": ["Hanken Grotesk"],
            "body-sm": ["Hanken Grotesk"],
            "headline-md": ["Hanken Grotesk"],
            "body-md": ["Hanken Grotesk"],
          },
          fontSize: {
            "data-mono": ["14px", { lineHeight: "20px", fontWeight: "500" }],
            "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "700" }],
            "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-sm": ["24px", { lineHeight: "32px", fontWeight: "600" }],
            "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "headline-md": ["32px", { lineHeight: "40px", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(24px)" },
              "100%": { opacity: "1", transform: "translateY(0)" },
            },
            pulseGlow: {
              "0%, 100%": { boxShadow: "0 0 0 0 rgba(1,45,29,0.25)" },
              "50%": { boxShadow: "0 0 0 12px rgba(1,45,29,0)" },
            },
            float: {
              "0%, 100%": { transform: "translateY(0)" },
              "50%": { transform: "translateY(-8px)" },
            },
          },
          animation: {
            "fade-up": "fadeUp .6s ease-out both",
            "pulse-glow": "pulseGlow 2.5s ease-in-out infinite",
            float: "float 6s ease-in-out infinite",
          },
        },
      },
    };
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    /* Animated grid background */
    .grid-bg {
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(1, 45, 29, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(1, 45, 29, 0.04) 1px, transparent 1px);
    }

    /* Gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    /* Input focus ring */
    .login-input:focus {
      outline: none;
      border-color: #012d1d;
      box-shadow: 0 0 0 3px rgba(1, 45, 29, 0.12);
    }

    /* Shake animation for errors */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(6px); }
      45% { transform: translateX(-4px); }
      60% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
    }
    .shake { animation: shake .45s ease-in-out; }

    /* Smooth loader spinner */
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(1, 45, 29, 0.08);
      pointer-events: none;
      animation: float var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }
  </style>
</head>

<body class="bg-background text-on-background font-body-md overflow-x-hidden min-h-screen flex items-center justify-center grid-bg relative">

  <!-- Decorative orbs -->
  <div class="orb w-[420px] h-[420px] bg-primary-fixed opacity-40 -top-32 -left-32 animate-float" style="--delay:0s;--dur:8s"></div>
  <div class="orb w-[340px] h-[340px] bg-secondary-fixed opacity-30 bottom-[-80px] right-[-60px] animate-float" style="--delay:2s;--dur:10s"></div>
  <div class="orb w-[200px] h-[200px] bg-tertiary-fixed opacity-20 top-1/3 right-1/4 animate-float" style="--delay:4s;--dur:12s"></div>

  <!-- Floating particles -->
  <div class="particle w-2 h-2 top-[15%] left-[10%]" style="--dur:5s;--delay:0s"></div>
  <div class="particle w-3 h-3 top-[70%] left-[20%]" style="--dur:7s;--delay:1s"></div>
  <div class="particle w-2 h-2 top-[30%] right-[15%]" style="--dur:6s;--delay:2s"></div>
  <div class="particle w-4 h-4 bottom-[20%] right-[30%]" style="--dur:8s;--delay:3s"></div>
  <div class="particle w-2 h-2 top-[50%] left-[40%]" style="--dur:9s;--delay:1.5s"></div>

  <!-- ─── Login Card ─── -->
  <main class="relative z-10 w-full max-w-[440px] mx-margin-mobile md:mx-auto animate-fade-up">

    <!-- Card -->
    <div class="bg-surface-container-lowest/80 backdrop-blur-xl rounded-2xl border border-outline-variant shadow-[0_24px_64px_rgba(0,0,0,0.08)] p-8 md:p-10">

      <!-- Brand header -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-primary-container flex items-center justify-center mb-4 animate-pulse-glow">
          <span class="material-symbols-outlined text-on-primary-container" style="font-size:32px">agriculture</span>
        </div>
        <h1 class="font-headline-md text-headline-md text-primary">AgriPulse Pro</h1>
        <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Sign in to your command centre</p>
      </div>

      <!-- Status chip -->
      <div class="flex items-center justify-center gap-xs mb-8">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
        </span>
        <span class="font-data-mono text-data-mono text-on-surface-variant">SYSTEM ONLINE</span>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="flex flex-col gap-5" autocomplete="off" novalidate>

        <!-- Username field -->
        <div class="flex flex-col gap-1.5">
          <label for="username" class="font-label-caps text-label-caps text-on-surface-variant uppercase">Username</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
            <input
              id="username"
              name="username"
              type="text"
              placeholder="Enter your username"
              class="login-input w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-on-surface font-body-md text-body-md placeholder:text-outline transition-all duration-200"
              required
            >
          </div>
        </div>

        <!-- Password field -->
        <div class="flex flex-col gap-1.5">
          <label for="password" class="font-label-caps text-label-caps text-on-surface-variant uppercase">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Enter your password"
              class="login-input w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-xl text-on-surface font-body-md text-body-md placeholder:text-outline transition-all duration-200"
              required
            >
            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors"
              aria-label="Toggle password visibility"
            >
              <span class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div id="errorBox" class="hidden items-center gap-sm p-3 bg-error-container text-on-error-container rounded-xl border border-error/20 transition-all duration-300">
          <span class="material-symbols-outlined text-[20px]">error</span>
          <span id="errorText" class="font-body-sm text-body-sm">Invalid username or password</span>
        </div>

        <!-- Success message -->
        <div id="successBox" class="hidden items-center gap-sm p-3 bg-primary-fixed text-on-primary-fixed rounded-xl border border-primary/20 transition-all duration-300">
          <span class="material-symbols-outlined text-[20px]">check_circle</span>
          <span id="successText" class="font-body-sm text-body-sm">Login successful — redirecting…</span>
        </div>

        <!-- Submit button -->
        <button
          id="loginBtn"
          type="submit"
          class="relative flex items-center justify-center gap-sm w-full py-3.5 bg-primary text-on-primary font-label-caps text-label-caps uppercase rounded-xl hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-2 overflow-hidden"
        >
          <span id="btnLabel">Sign In</span>
          <span class="material-symbols-outlined text-[20px]" id="btnIcon">arrow_forward</span>
          <div id="btnSpinner" class="spinner absolute hidden"></div>
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-md mt-8">
        <span class="flex-1 h-px bg-outline-variant"></span>
        <span class="font-label-caps text-label-caps text-outline uppercase">Secure Access</span>
        <span class="flex-1 h-px bg-outline-variant"></span>
      </div>

      <!-- Footer info -->
      <div class="flex flex-col items-center gap-2 mt-6">
        <div class="flex items-center gap-xs text-on-surface-variant">
          <span class="material-symbols-outlined text-[16px]">shield</span>
          <span class="font-body-sm text-body-sm">256-bit encrypted connection</span>
        </div>
        <span class="font-body-sm text-body-sm text-outline">© 2026 AgriPulse Pro — All rights reserved</span>
      </div>
    </div>

    <!-- Bottom decorative bar -->
    <div class="mt-4 flex justify-center gap-1">
      <span class="w-8 h-1 rounded-full bg-primary opacity-70"></span>
      <span class="w-2 h-1 rounded-full bg-outline-variant"></span>
      <span class="w-2 h-1 rounded-full bg-outline-variant"></span>
    </div>
  </main>

  <!-- ─── Script ─── -->
  <script type="module">
    import { authenticate } from "./src/credentials.js";

    const form        = document.getElementById("loginForm");
    const usernameIn  = document.getElementById("username");
    const passwordIn  = document.getElementById("password");
    const errorBox    = document.getElementById("errorBox");
    const errorText   = document.getElementById("errorText");
    const successBox  = document.getElementById("successBox");
    const successText = document.getElementById("successText");
    const loginBtn    = document.getElementById("loginBtn");
    const btnLabel    = document.getElementById("btnLabel");
    const btnIcon     = document.getElementById("btnIcon");
    const btnSpinner  = document.getElementById("btnSpinner");
    const togglePwd   = document.getElementById("togglePassword");

    // Toggle password visibility
    togglePwd.addEventListener("click", () => {
      const isPassword = passwordIn.type === "password";
      passwordIn.type = isPassword ? "text" : "password";
      togglePwd.querySelector("span").textContent = isPassword
        ? "visibility_off"
        : "visibility";
    });

    // Form submission
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // Hide previous messages
      errorBox.classList.add("hidden");
      errorBox.classList.remove("flex");
      successBox.classList.add("hidden");
      successBox.classList.remove("flex");

      const username = usernameIn.value;
      const password = passwordIn.value;

      // Basic validation
      if (!username || !password) {
        showError("Please fill in all fields");
        return;
      }

      // Show loading state
      setLoading(true);

      // Simulate network delay for realism
      await sleep(1200);

      const result = authenticate(username, password);

      if (result.success) {
        setLoading(false);
        showSuccess(`Welcome, ${result.user.username}!  Redirecting…`);
        // Store session
        sessionStorage.setItem("agripulse_user", JSON.stringify(result.user));
        // Redirect after brief pause
        await sleep(1500);
        window.location.href = "index.html";
      } else {
        setLoading(false);
        showError(result.message);
        form.classList.add("shake");
        setTimeout(() => form.classList.remove("shake"), 500);
      }
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorBox.classList.remove("hidden");
      errorBox.classList.add("flex");
    }

    function showSuccess(msg) {
      successText.textContent = msg;
      successBox.classList.remove("hidden");
      successBox.classList.add("flex");
    }

    function setLoading(on) {
      loginBtn.disabled = on;
      btnLabel.classList.toggle("invisible", on);
      btnIcon.classList.toggle("invisible", on);
      btnSpinner.classList.toggle("hidden", !on);
      loginBtn.classList.toggle("opacity-80", on);
      loginBtn.classList.toggle("cursor-wait", on);
    }

    function sleep(ms) {
      return new Promise((r) => setTimeout(r, ms));
    }
  </script>
</body>
</html>
